name: TestNG CI

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Go to project folder
        run: cd Lab8_TestNG_HandsOn_Project

      - name: Run TestNG suite
        run: cd Lab8_TestNG_HandsOn_Project && mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml

      - name: Upload TestNG Reports
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: Lab8_TestNG_HandsOn_Project/target/surefire-reports
